<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PeakTier - Desafío</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <div class="bg-layer layer-1"></div>
        <div class="bg-layer layer-2"></div>
        <div class="bg-layer layer-3"></div>

        <div id="hud">
            <div class="player-info">Org <span id="score-org">0</span></div>
            <div class="title-emblem">DESAFÍO CALLEJERO</div>
            <div class="player-info"><span id="score-guest">0</span> Inv</div>
        </div>

        <div id="battle-area">
            <div id="hand-org" class="hand">✊</div> 
            <div id="hand-guest" class="hand">✊</div> 
        </div>

        <div id="result-message" class="hidden"></div>

        <div id="controls-container">
            <div id="queue">Tu combo: <span id="q1">_</span> <span id="q2">_</span> <span id="q3">_</span></div>
            <div id="controls">
                <button class="btn-play" onclick="seleccionarJugada('piedra')">✊</button>
                <button class="btn-play" onclick="seleccionarJugada('papel')">✋</button>
                <button class="btn-play" onclick="seleccionarJugada('tijera')">✌️</button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
