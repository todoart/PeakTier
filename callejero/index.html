<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PeakTier - Desafío</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="game-container">
        <div class="bg-layer layer-1"></div>

        <div id="hud">
            <div class="player-info">
                <span>Org</span> 
                <span class="score"><img src="assets/ui/oro.png" class="gold-icon"> <span id="score-org">0</span></span>
            </div>
            <div class="title-emblem">DESAFÍO</div>
            <div class="player-info">
                <span class="score"><span id="score-guest">0</span> <img src="assets/ui/oro.png" class="gold-icon"></span>
                <span>Inv</span>
            </div>
        </div>

        <div id="battle-area">
            <div id="hand-org" class="hand"><img src="assets/manos/piedra.png" alt="Piedra"></div> 
            <div id="hand-guest" class="hand"><img src="assets/manos/piedra.png" alt="Piedra"></div> 
        </div>

        <div id="result-message" class="hidden"></div>

        <div id="controls-container">
            <div id="queue">
                <div class="queue-title">Principal | Reservas</div>
                <span id="q0" class="slot-principal">_</span> 
                <span id="q1" class="slot-reserva">_</span> 
                <span id="q2" class="slot-reserva">_</span>
            </div>
            <div id="controls">
                <button class="btn-play" onclick="seleccionarJugada('piedra')">
                    <img src="assets/manos/piedra.png" alt="Piedra">
                </button>
                <button class="btn-play" onclick="seleccionarJugada('papel')">
                    <img src="assets/manos/papel.png" alt="Papel">
                </button>
                <button class="btn-play" onclick="seleccionarJugada('tijera')">
                    <img src="assets/manos/tijera.png" alt="Tijera">
                </button>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
